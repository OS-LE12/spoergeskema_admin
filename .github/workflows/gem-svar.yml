---
name: Gem brugersvar

"on":
  repository_dispatch:
    types:
      - nyt-svar

permissions:
  contents: write

jobs:
  gem-svar:
    runs-on: ubuntu-latest
    steps:
      - name: Hent repository
        uses: actions/checkout@v4

      - name: Gem svar i data.json
        run: |
          cat << 'PYEOF' > /tmp/gem_svar.py
          import json, os, datetime, sys

          raw = os.environ.get('SVAR_DATA', '{}')
          try:
              nyt_svar = json.loads(raw)
          except Exception as e:
              print(f"Fejl ved parsing af svar: {e}")
              sys.exit(1)

          if 'timestamp' not in nyt_svar:
              nyt_svar['timestamp'] = datetime.datetime.utcnow().isoformat()

          try:
              with open('data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              data = {'schema': None, 'responses': []}

          if 'responses' not in data:
              data['responses'] = []

          ids = {r.get('id') for r in data['responses']}
          if nyt_svar.get('id') not in ids:
              data['responses'].append(nyt_svar)
              print(f"Tilfojet svar fra: {nyt_svar.get('contact', {}).get('name', 'Ukendt')}")
          else:
              print(f"Duplikat ignoreret: {nyt_svar.get('id')}")

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"Total svar: {len(data['responses'])}")
          PYEOF
          python3 /tmp/gem_svar.py
        env:
          SVAR_DATA: ${{ toJson(github.event.client_payload) }}

      - name: Commit svar
        run: |
          git config user.name "Spørgeskema Bot"
          git config user.email "bot@github-actions"
          git add data.json
          if git diff --staged --quiet; then
            echo "Ingen aendringer at gemme"
          else
            git commit -m "Nyt svar $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
